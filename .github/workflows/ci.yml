name: Test

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  format:
    name: Rust formatting
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v5
      - name: Check formatting with the pinned Rust image
        run: >-
          docker run --rm
          --volume "$PWD:/work"
          --workdir /work
          rust:1.95-bookworm
          sh -c 'rustup component add rustfmt && cargo fmt --check'

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v5
      - name: Run Clippy with the pinned Rust image
        run: >-
          docker run --rm
          --volume "$PWD:/work"
          --workdir /work
          rust:1.95-bookworm
          sh -c 'rustup component add clippy && cargo clippy --locked --all-targets --all-features -- -D warnings'

  turso-platform-tests:
    name: Turso behavior (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            platform-pair: amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            platform-pair: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Check out source
        uses: actions/checkout@v5
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Run tests inside the target-platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Containerfile
          target: test
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=test-${{ matrix.platform-pair }}
          cache-to: type=gha,mode=max,scope=test-${{ matrix.platform-pair }}

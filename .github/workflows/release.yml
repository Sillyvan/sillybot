name: Release Container Image

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to publish, such as v0.1.1
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  validate-version:
    name: Validate release tag
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - name: Require tag to match Cargo package version
        shell: bash
        run: |
          tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          version="$(awk -F'"' '/^version = "/ { print $2; exit }' Cargo.toml)"
          test "$tag" = "v$version"

  turso-platform-tests:
    name: Turso behavior (${{ matrix.platform }})
    needs: validate-version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            platform-pair: amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            platform-pair: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Check out source
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Run tests inside the target-platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Containerfile
          target: test
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=test-${{ matrix.platform-pair }}
          cache-to: type=gha,mode=max,scope=test-${{ matrix.platform-pair }}

  publish-platform:
    name: Publish GHCR image (${{ matrix.platform }})
    needs: turso-platform-tests
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            platform-pair: amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            platform-pair: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Check out source
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - name: Resolve container image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Authenticate to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate immutable image tags
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
            type=sha,prefix=sha-
      - name: Build and publish platform image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Containerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.metadata.outputs.labels }}
          outputs: type=image,name=${{ steps.image.outputs.name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=release-${{ matrix.platform-pair }}
          cache-to: type=gha,mode=max,scope=release-${{ matrix.platform-pair }}
      - name: Export image digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - name: Upload image digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.platform-pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish multi-platform manifest
    needs: publish-platform
    runs-on: ubuntu-latest
    steps:
      - name: Download image digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Resolve container image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - name: Authenticate to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate immutable image tags
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
            type=sha,prefix=sha-
      - name: Create multi-platform manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ steps.image.outputs.name }}@sha256:%s ' *)

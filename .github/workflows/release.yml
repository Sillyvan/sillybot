name: Release Container Image

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

jobs:
  validate-version:
    name: Validate release tag
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v5
      - name: Require tag to match Cargo package version
        shell: bash
        run: |
          version="$(awk -F'"' '/^version = "/ { print $2; exit }' Cargo.toml)"
          test "$GITHUB_REF_NAME" = "v$version"

  turso-platform-tests:
    name: Turso behavior (${{ matrix.platform }})
    needs: validate-version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Check out source
        uses: actions/checkout@v5
      - name: Run tests inside the target-platform image
        run: docker build --target test --file deploy/Containerfile .

  publish:
    name: Publish GHCR image
    needs: turso-platform-tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v5
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Authenticate to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate immutable image tags
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=sha,prefix=sha-
      - name: Build and publish multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
